<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — </title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const u = initAppShell('Dashboard');
  if (!u) return;
  const el = document.getElementById('pageContent');
  if (u.role==='coordinator')       await renderCoordinator(u, el);
  else if (u.role==='student')      await renderStudent(u, el);
  else if (u.role==='organization') await renderOrg(u, el);
});

async function renderCoordinator(u, el) {
  const [students, orgs, placements, reminders] = await Promise.all([getStudents(), getOrganizations(), getPlacements(), getUpcomingDueDateReminders(3)]);
  const confirmed = placements.filter(p=>p.status==='confirmed').length;
  const pending   = placements.filter(p=>p.status==='pending').length;
  const unmatched = students.filter(s=>!placements.find(p=>p.student_id===s.id)).length;
  const coord = await getCoordByUserId(u.id);
  el.innerHTML = `
    <div class="page-header d-flex align-center justify-between flex-wrap gap-2">
      <div>
        <h1>Good to see you, ${esc(coord?.full_name||u.email?.split('@')[0]||'Coordinator')}</h1>
        <p>${esc(coord?.department||'Department not set')} · IAMS</p>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <button class="btn btn-outline btn-sm" onclick="exportPlacementsCSV()">⬇ Export CSV</button>
        <a href="reports.html" class="btn btn-blue btn-sm">📊 Reports</a>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val blue">${students.length}</div><div class="stat-lbl">Students</div></div>
      <div class="stat-card"><div class="stat-val green">${orgs.length}</div><div class="stat-lbl">Organizations</div></div>
      <div class="stat-card"><div class="stat-val green">${confirmed}</div><div class="stat-lbl">Confirmed</div></div>
      <div class="stat-card"><div class="stat-val amber">${pending}</div><div class="stat-lbl">Pending</div></div>
      <div class="stat-card"><div class="stat-val red">${unmatched}</div><div class="stat-lbl">Unmatched</div></div>
    </div>
    <div class="card-grid">
      <a href="students.html"      class="action-card ac-blue">  <span class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></span><h3>Students</h3><p>Browse, search, filter and export all registered students.</p><span class="ac-arrow">↗</span></a>
      <a href="organizations.html" class="action-card ac-green"> <span class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18V7H3z"/><path d="M7 21V11"/><path d="M12 21V11"/><path d="M17 21V11"/></svg></span><h3>Organizations</h3><p>Browse organizations and filter by industry.</p><span class="ac-arrow">↗</span></a>
      <a href="match.html"         class="action-card ac-amber"> <span class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span><h3>Run Matching</h3><p>Execute the skill-based algorithm to assign students.</p><span class="ac-arrow">↗</span></a>
      <a href="placements.html"    class="action-card ac-purple"><span class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6v4H9z"/><path d="M19 7H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/></svg></span><h3>Placements</h3><p>Confirm or reject placements with optional reasons.</p><span class="ac-arrow">↗</span></a>
      <a href="logbooks.html"      class="action-card ac-blue">  <span class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><h3>Logbooks</h3><p>View all student weekly logbook submissions.</p><span class="ac-arrow">↗</span></a>
      <a href="reports.html"       class="action-card ac-green"> <span class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="8 12 12 8 16 12"/><line x1="12" y1="8" x2="12" y2="16"/></svg></span><h3>Reports</h3><p>Analytics, assessments and activity log.</p><span class="ac-arrow">↗</span></a>
      <a href="notifications.html" class="action-card ac-amber"><span class="icon-wrap">!</span><h3>Due Date Reminders</h3><p>${reminders.length ? `${reminders.length} upcoming due date${reminders.length>1?'s':''}.` : 'Create and send reminders to all students.'}</p><span class="ac-arrow">-></span></a>
    </div>
    ${reminders.length ? `
      <div class="card mt-3">
        <h3>Upcoming Due Dates</h3>
        ${reminders.map(r => `<div class="mini-card"><div class="d-flex align-center justify-between gap-2 flex-wrap"><div><p class="text-strong">${esc(r.title)}</p><p class="text-xs text-muted">${esc(r.message || 'Check notifications for details.')}</p></div><span class="badge ${daysUntil(r.due_date) <= 3 ? 'badge-amber' : 'badge-blue'}">${dueDateLabel(r.due_date)}</span></div><p class="text-xs text-muted mt-1">Due ${fmtDate(r.due_date)}</p></div>`).join('')}
      </div>` : ''}`;
}

async function renderStudent(u, el) {
  const student = await getStudentByUserId(u.id);
  if (!student) { el.innerHTML=`<div class="empty"><h3>Profile incomplete</h3><p><a href="profile.html" class="text-blue">Complete your profile →</a></p></div>`; return; }
  const [placements, orgs, notifs, reminders] = await Promise.all([getPlacements(), getOrganizations(), getNotifications(u.id), getUpcomingDueDateReminders(3)]);
  const placement = placements.find(p=>p.student_id===student.id);
  const org = placement ? orgs.find(o=>o.id===placement.org_id) : null;
  const skills = split(student.skills);
  const prefs  = split(student.preferences);
  const unread = notifs.filter(n=>!n.is_read).length;
  el.innerHTML = `
    <div class="page-header d-flex align-center justify-between flex-wrap gap-2">
      <div>
        <h1>Hello, ${esc(student.full_name||'Student')}</h1>
        <p>${esc(student.student_id||'—')} · ${esc(student.department||'Department not set')}</p>
      </div>
      ${unread>0?`<a href="notifications.html" class="btn btn-blue btn-sm">🔔 ${unread} new notification${unread>1?'s':''}</a>`:''}
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val blue">${skills.length}</div><div class="stat-lbl">Skills</div></div>
      <div class="stat-card"><div class="stat-val green">${student.gpa||'—'}</div><div class="stat-lbl">GPA</div></div>
      <div class="stat-card"><div class="stat-val ${placement?'green':'amber'}">${placement?placement.status==='confirmed'?'Confirmed':'Pending':'Waiting'}</div><div class="stat-lbl">Placement</div></div>
    </div>
    <div class="grid-two">
      <div class="card">
        <h3>My Skills</h3>
        ${skills.length?`<div class="tags">${skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>`:'<p class="text-muted text-sm">No skills listed yet. <a href="profile.html" class="text-blue">Add skills →</a></p>'}
        ${prefs.length?`<div class="divider"></div><p class="text-xs text-muted mb-2 text-uppercase">Preferences</p><div class="tags">${prefs.map(p=>`<span class="tag tag-green">${esc(p)}</span>`).join('')}</div>`:''}
        <div class="mt-3"><a href="profile.html" class="btn btn-outline btn-sm">Edit Profile</a></div>
      </div>
      <div class="card">
        <h3>My Placement</h3>
        ${placement&&org?`
          <div class="mini-card">
            <p class="text-xs text-muted mb-2 text-uppercase">Allocated Organization</p>
            <p class="font-serif text-lg">${esc(org.org_name)}</p>
            <p class="text-muted text-sm">${esc(org.industry||'')}</p>
            <span class="badge ${placement.status==='confirmed'?'badge-green':placement.status==='rejected'?'badge-red':'badge-amber'} mt-2">${placement.status}</span>
            <div class="score-wrap mt-2"><div class="score-bar"><div class="score-fill" style="width:${placement.score}%"></div></div><span class="score-num">${placement.score}%</span></div>
          </div>
          <a href="my-placement.html" class="btn btn-blue btn-sm">View Full Details →</a>`
        :`<div class="empty empty-padded"><p>Not matched yet. The coordinator will run the algorithm soon.</p></div>
          <a href="organizations.html" class="btn btn-outline btn-sm">Browse Organizations</a>`}
      </div>
    </div>
    <div class="grid-two mt-3">
      <a href="my-logbook.html" class="action-card ac-blue"><span class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span><h3>My Logbook</h3><p>Submit your weekly attachment activities here.</p><span class="ac-arrow">↗</span></a>
      <a href="notifications.html" class="action-card ac-green"><span class="icon-wrap">🔔</span><h3>Notifications</h3><p>${unread>0?`You have ${unread} unread notification${unread>1?'s':''}.`:'No new notifications.'}</p><span class="ac-arrow">↗</span></a>
    </div>
    ${reminders.length ? `
      <div class="card mt-3">
        <h3>Upcoming Due Dates</h3>
        ${reminders.map(r => `<div class="mini-card"><div class="d-flex align-center justify-between gap-2 flex-wrap"><div><p class="text-strong">${esc(r.title)}</p><p class="text-xs text-muted">${esc(r.message || 'Check notifications for details.')}</p></div><span class="badge ${daysUntil(r.due_date) <= 3 ? 'badge-amber' : 'badge-blue'}">${dueDateLabel(r.due_date)}</span></div><p class="text-xs text-muted mt-1">Due ${fmtDate(r.due_date)}</p></div>`).join('')}
      </div>` : ''}`;
}

async function renderOrg(u, el) {
  const org = await getOrgByUserId(u.id);
  if (!org) { el.innerHTML=`<div class="empty"><h3>Profile incomplete</h3><p><a href="profile.html" class="text-blue">Complete your profile →</a></p></div>`; return; }
  const [placements, students] = await Promise.all([getPlacements(), getStudents()]);
  const myP = placements.filter(p=>p.org_id===org.id);
  const skills = split(org.required_skills);
  el.innerHTML = `
    <div class="page-header d-flex align-center justify-between">
      <div><h1>${esc(org.org_name||'Organization')}</h1><p>${esc(org.industry||'Industry not set')} · ${esc(u.email)}</p></div>
      <a href="profile.html" class="btn btn-outline btn-sm">Edit Profile</a>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val blue">${org.positions||1}</div><div class="stat-lbl">Positions</div></div>
      <div class="stat-card"><div class="stat-val green">${myP.length}</div><div class="stat-lbl">Allocated</div></div>
      <div class="stat-card"><div class="stat-val amber">${skills.length}</div><div class="stat-lbl">Req. Skills</div></div>
    </div>
    <div class="grid-two">
      <div class="card">
        <h3>Required Skills</h3>
        ${skills.length?`<div class="tags">${skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>`:'<p class="text-muted text-sm">None listed.</p>'}
        ${org.description?`<div class="divider"></div><p class="text-sm text-ink2 leading-loose">${esc(org.description)}</p>`:''}
        <div class="mt-3"><a href="profile.html" class="btn btn-outline btn-sm">Edit Profile</a></div>
      </div>
      <div class="card">
        <h3>Allocated Students</h3>
        ${myP.length?myP.map(p=>{const s=students.find(x=>x.id===p.student_id);return`<div class="mini-card"><div class="d-flex align-center justify-between"><div><p class="text-strong">${esc(s?.full_name||'Student')}</p><p class="text-xs text-muted">${esc(s?.student_id||'')}</p></div><span class="badge ${p.status==='confirmed'?'badge-green':'badge-amber'}">${p.status}</span></div><div class="score-wrap mt-2"><div class="score-bar"><div class="score-fill" style="width:${p.score}%"></div></div><span class="score-num">${p.score}%</span></div></div>`;}).join('')
        :'<div class="empty empty-padded"><p>No students allocated yet.</p></div>'}
      </div>
    </div>
    <div class="mt-3"><a href="supervisor-report.html" class="action-card ac-green" style="max-width:320px"><span class="icon-wrap">📋</span><h3>Submit Assessment Report</h3><p>Submit performance reports for allocated students.</p><span class="ac-arrow">↗</span></a></div>`;
}
</script>
</body>
</html>
