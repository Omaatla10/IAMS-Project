<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Placements — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let currentUser;
document.addEventListener('DOMContentLoaded', async () => {
  currentUser = initAppShell('Placements');
  if (!currentUser) return;
  await renderPlacements();
});

async function renderPlacements() {
  const [placements, students, orgs] = await Promise.all([getPlacements(), getStudents(), getOrganizations()]);
  const el = document.getElementById('pageContent');
  const isCoord = currentUser?.role === 'coordinator';
  const confirmed = placements.filter(p=>p.status==='confirmed').length;
  const pending   = placements.filter(p=>p.status==='pending').length;
  const rejected  = placements.filter(p=>p.status==='rejected').length;

  const rows = placements.map(p => {
    const s = students.find(x=>x.id===p.student_id);
    const o = orgs.find(x=>x.id===p.org_id);
    let actions = '';
    if (isCoord) {
      if (p.status==='pending') actions = `<button class="btn btn-success btn-sm" onclick="doConfirm('${p.id}')">✓ Confirm</button> <button class="btn btn-danger btn-sm" onclick="openReject('${p.id}')">✗ Reject</button>`;
      else if (p.status==='confirmed') actions = `<button class="btn btn-outline btn-sm" onclick="openReject('${p.id}')">Revoke</button>`;
      else actions = `<button class="btn btn-ghost btn-sm" onclick="doConfirm('${p.id}')">Restore</button>`;
    }
    return `<tr>
      <td><div class="d-flex align-center gap-2"><div class="av">${(s?.full_name||'S')[0].toUpperCase()}</div><strong>${esc(s?.full_name||'Unknown')}</strong></div></td>
      <td><code class="code-badge">${esc(s?.student_id||'—')}</code></td>
      <td><span class="text-strong">${esc(o?.org_name||'Unknown')}</span></td>
      <td class="text-sm text-muted">${esc(o?.industry||'—')}</td>
      <td><div class="score-wrap"><div class="score-bar"><div class="score-fill" style="width:${p.score}%"></div></div><span class="score-num">${p.score}%</span></div></td>
      <td><span class="badge ${p.status==='confirmed'?'badge-green':p.status==='rejected'?'badge-red':'badge-amber'}">${p.status}</span>${p.rejection_reason?`<br><span class="text-xs text-muted">${esc(p.rejection_reason)}</span>`:''}</td>
      ${isCoord?`<td style="white-space:nowrap">${actions}</td>`:''}
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="page-header d-flex align-center justify-between flex-wrap gap-2">
      <div><h1>Placement Results</h1><p>${placements.length} total · ${confirmed} confirmed · ${pending} pending · ${rejected} rejected</p></div>
      <div class="d-flex gap-2 flex-wrap">
        ${isCoord?'<button class="btn btn-outline btn-sm" onclick="exportPlacementsCSV()">⬇ Export CSV</button>':''}
        <a href="match.html" class="btn btn-outline btn-sm">← Matching</a>
      </div>
    </div>
    <div id="alertBox"></div>

    <!-- Reject modal -->
    <div id="rejectModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:1rem">
      <div style="background:var(--surface,#fff);border-radius:16px;padding:2rem;max-width:440px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.2)">
        <h3 style="margin-bottom:.5rem">Reject / Revoke Placement</h3>
        <p class="text-sm text-muted mb-3">Provide an optional reason. The student will be notified automatically.</p>
        <textarea id="rejectReason" class="form-control" rows="3" placeholder="e.g. Skills mismatch, position no longer available…"></textarea>
        <div class="d-flex gap-2 mt-3" style="justify-content:flex-end">
          <button class="btn btn-ghost" onclick="closeReject()">Cancel</button>
          <button class="btn btn-danger" onclick="submitReject()">Confirm Rejection</button>
        </div>
      </div>
    </div>

    ${placements.length?`
    <div class="table-wrap">
      <table>
        <thead><tr><th>Student</th><th>ID</th><th>Organization</th><th>Industry</th><th>Score</th><th>Status</th>${isCoord?'<th>Actions</th>':''}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`
    :`<div class="empty"><h3>No placements yet</h3><p>Run the matching algorithm first.</p>${isCoord?'<a href="match.html" class="btn btn-blue mt-3">🎯 Run Matching →</a>':''}</div>`}`;
}

async function doConfirm(id) {
  await confirmPlacement(id);
  showAlert('alertBox','✓ Placement confirmed. Student notified.','success');
  await renderPlacements();
}

let _rejectId = null;
function openReject(id) { _rejectId=id; const m=document.getElementById('rejectModal'); m.style.display='flex'; document.getElementById('rejectReason').value=''; }
function closeReject()  { document.getElementById('rejectModal').style.display='none'; _rejectId=null; }
async function submitReject() {
  const reason = document.getElementById('rejectReason').value.trim();
  await rejectPlacement(_rejectId, reason);
  closeReject();
  showAlert('alertBox','Placement rejected. Student notified.','info');
  await renderPlacements();
}
</script>
</body>
</html>
