<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>My Placement — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const u = initAppShell('My Placement');
  if (!u) return;
  const student = await getStudentByUserId(u.id);
  const [placements, orgs] = await Promise.all([getPlacements(), getOrganizations()]);
  const placement = student ? placements.find(p=>p.student_id===student.id) : null;
  const org       = placement ? orgs.find(o=>o.id===placement.org_id) : null;
  const el        = document.getElementById('pageContent');

  el.innerHTML = `<div class="page-header"><div class="page-header-left"><h1>My Placement</h1><p>Your industrial attachment allocation result</p></div></div>`;

  if (!placement || !org) {
    el.innerHTML += `<div class="empty"><h3>Not matched yet</h3><p>You haven't been matched to an organization yet. The coordinator will run the algorithm soon.</p>
      <div class="d-flex gap-2 mt-3" style="justify-content:center"><a href="dashboard.html" class="btn btn-outline">← Dashboard</a><a href="organizations.html" class="btn btn-blue">Browse Organizations</a></div></div>`;
    return;
  }

  const date   = fmtDate(placement.created_at);
  const skills = split(org.required_skills);

  el.innerHTML += `
    <div class="placement-card">
      <div class="placement-accent"></div>
      <div class="placement-body">
        <div class="placement-top">
          <div class="placement-org"><h2>${esc(org.org_name)}</h2><p>${esc(org.industry||'Industry not specified')}</p></div>
          <span class="badge ${placement.status==='confirmed'?'badge-green':placement.status==='rejected'?'badge-red':'badge-amber'}">
            ${placement.status==='confirmed'?'✓ Confirmed':placement.status==='rejected'?'✗ Rejected':'⏳ Awaiting confirmation'}
          </span>
        </div>

        ${placement.status==='rejected'&&placement.rejection_reason?`
        <div style="margin:1rem 0;padding:.85rem;background:rgba(220,38,38,.06);border-radius:8px;border:1px solid rgba(220,38,38,.2)">
          <p class="text-xs text-muted mb-1 text-uppercase">Rejection Reason</p>
          <p class="text-sm">${esc(placement.rejection_reason)}</p>
        </div>`:''}

        <div class="placement-score-row">
          <div class="placement-score-n">${placement.score}%</div>
          <div class="placement-score-right">
            <div class="placement-score-lbl">Match Score</div>
            <div class="score-bar sm"><div class="score-fill" style="width:${placement.score}%"></div></div>
            <p class="text-xs text-muted mt-1">Based on skill overlap, industry preference and GPA.</p>
          </div>
        </div>

        <div class="placement-meta">
          <div class="pmeta-item"><div class="k">Contact Person</div><div class="v">${esc(org.contact_person||'—')}</div></div>
          <div class="pmeta-item"><div class="k">Phone</div><div class="v">${esc(org.phone||'—')}</div></div>
          <div class="pmeta-item"><div class="k">Industry</div><div class="v">${esc(org.industry||'—')}</div></div>
          <div class="pmeta-item"><div class="k">Positions Available</div><div class="v">${org.positions||1}</div></div>
          <div class="pmeta-item"><div class="k">Matched On</div><div class="v">${date}</div></div>
          <div class="pmeta-item"><div class="k">Status</div><div class="v"><span class="badge ${placement.status==='confirmed'?'badge-green':placement.status==='rejected'?'badge-red':'badge-amber'}">${placement.status}</span></div></div>
        </div>

        ${org.description?`<div class="divider"></div><p class="text-xs text-muted mb-2 text-uppercase">About the Organization</p><p class="text-sm text-ink2 leading-loose">${esc(org.description)}</p>`:''}
        ${skills.length?`<div class="divider"></div><p class="text-xs text-muted mb-2 text-uppercase">Required Skills</p><div class="tags">${skills.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>`:''}

        <div class="divider"></div>
        <div class="d-flex gap-2">
          <a href="dashboard.html" class="btn btn-outline btn-sm">← Dashboard</a>
          <a href="my-logbook.html" class="btn btn-blue btn-sm">📓 Submit Logbook</a>
        </div>
      </div>
    </div>`;
});
</script>
</body>
</html>
