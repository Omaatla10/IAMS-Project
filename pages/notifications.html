<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Notifications — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let currentUser, notifs = [];

document.addEventListener('DOMContentLoaded', async () => {
  currentUser = initAppShell('Notifications');
  if (!currentUser) return;
  await loadNotifs();
});

async function loadNotifs() {
  notifs = await getNotifications(currentUser.id);
  render();
  updateNotifBadge();
}

async function markOne(id) {
  await markNotifRead(id);
  notifs = notifs.map(n => n.id===id ? {...n, is_read:true} : n);
  render(); updateNotifBadge();
}

async function markAll() {
  await markAllNotifsRead(currentUser.id);
  await loadNotifs();
}

function render() {
  const el = document.getElementById('pageContent');
  const unread = notifs.filter(n=>!n.is_read).length;
  const typeIcon = { success:'✅', info:'ℹ️', warning:'⚠️', error:'❌' };

  const items = notifs.map(n => `
    <div style="display:flex;align-items:flex-start;gap:1rem;padding:1rem;border-bottom:1px solid var(--border);background:${n.is_read?'transparent':'rgba(37,99,235,.04)'}">
      <div style="font-size:1.4rem;flex-shrink:0;margin-top:.1rem">${typeIcon[n.type]||'🔔'}</div>
      <div style="flex:1;min-width:0">
        <div class="d-flex align-center justify-between gap-2 flex-wrap">
          <p style="font-weight:600;font-size:.9rem">${esc(n.title)}</p>
          <div class="d-flex align-center gap-2">
            <span class="text-xs text-muted">${relTime(n.created_at)}</span>
            ${!n.is_read?'<span class="badge badge-blue" style="font-size:.58rem">New</span>':''}
          </div>
        </div>
        <p class="text-sm mt-1" style="line-height:1.55">${esc(n.message)}</p>
      </div>
      ${!n.is_read?`<button class="btn btn-ghost btn-sm" style="flex-shrink:0;font-size:.75rem" onclick="markOne('${n.id}')">Mark read</button>`:''}
    </div>`).join('');

  el.innerHTML = `
    <div class="page-header d-flex align-center justify-between flex-wrap gap-2">
      <div><h1>Notifications</h1><p>${notifs.length} total · ${unread} unread</p></div>
      ${unread>0?`<button class="btn btn-outline btn-sm" onclick="markAll()">✓ Mark all read</button>`:''}
    </div>
    ${notifs.length
      ? `<div class="card" style="padding:0;overflow:hidden">${items}</div>`
      : `<div class="empty"><div style="font-size:3rem;margin-bottom:.5rem">🔔</div><h3>No notifications yet</h3><p>You will be notified here when your placement is updated or a deadline is approaching.</p></div>`}`;
}
</script>
</body>
</html>
