<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reports — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const u = initAppShell('Reports');
  if (!u) return;
  Auth.require('coordinator');
  await renderReports();
});

async function renderReports() {
  const [students, orgs, placements, logs, supReports, assessments, actLog] = await Promise.all([
    getStudents(), getOrganizations(), getPlacements(),
    getAllLogbooks(), getAllSupervisorReports(), getAllAssessments(), getActivityLog(40)
  ]);

  const confirmed = placements.filter(p=>p.status==='confirmed').length;
  const pending   = placements.filter(p=>p.status==='pending').length;
  const rejected  = placements.filter(p=>p.status==='rejected').length;
  const unmatched = students.filter(s=>!placements.find(p=>p.student_id===s.id)).length;
  const matchRate = students.length > 0 ? Math.round((placements.length/students.length)*100) : 0;
  const avgScore  = placements.length > 0 ? Math.round(placements.reduce((a,p)=>a+(p.score||0),0)/placements.length) : 0;

  // Score distribution
  const dist = { '90-100':0,'70-89':0,'50-69':0,'0-49':0 };
  placements.forEach(p => { if(p.score>=90) dist['90-100']++; else if(p.score>=70) dist['70-89']++; else if(p.score>=50) dist['50-69']++; else dist['0-49']++; });

  // Top industries
  const indMap = {};
  orgs.forEach(o => { if(o.industry) indMap[o.industry]=(indMap[o.industry]||0)+1; });
  const topInds = Object.entries(indMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Departments
  const deptMap = {};
  students.forEach(s => { if(s.department) deptMap[s.department]=(deptMap[s.department]||0)+1; });
  const topDepts = Object.entries(deptMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const actIcons = { login:'🔑', run_matching:'🎯', confirm_placement:'✅', reject_placement:'⚠️', profile_update:'👤', export_csv:'⬇', clear_placements:'🗑️', password_change:'🔒', submit_logbook:'📓', submit_supervisor_report:'📋' };

  const el = document.getElementById('pageContent');
  el.innerHTML = `
    <div class="page-header d-flex align-center justify-between flex-wrap gap-2">
      <div><h1>Reports & Analytics</h1><p>Placement statistics, assessments and activity</p></div>
      <button class="btn btn-outline btn-sm" onclick="exportPlacementsCSV()">⬇ Export CSV</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val blue">${students.length}</div><div class="stat-lbl">Students</div></div>
      <div class="stat-card"><div class="stat-val green">${orgs.length}</div><div class="stat-lbl">Organizations</div></div>
      <div class="stat-card"><div class="stat-val green">${confirmed}</div><div class="stat-lbl">Confirmed</div></div>
      <div class="stat-card"><div class="stat-val amber">${pending}</div><div class="stat-lbl">Pending</div></div>
      <div class="stat-card"><div class="stat-val red">${unmatched}</div><div class="stat-lbl">Unmatched</div></div>
      <div class="stat-card"><div class="stat-val blue">${matchRate}%</div><div class="stat-lbl">Match Rate</div></div>
      <div class="stat-card"><div class="stat-val green">${avgScore}%</div><div class="stat-lbl">Avg Score</div></div>
      <div class="stat-card"><div class="stat-val blue">${logs.length}</div><div class="stat-lbl">Logbooks</div></div>
    </div>

    <!-- Charts row -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1.5rem">
      <div class="card">
        <h3 style="margin-bottom:1rem">Placement Status</h3>
        ${[['Confirmed',confirmed,'var(--green)'],['Pending',pending,'var(--amber)'],['Rejected',rejected,'var(--red)'],['Unmatched',unmatched,'rgba(0,0,0,.25)']].map(([lbl,val,col])=>{
          const pct = students.length>0 ? Math.round(val/students.length*100):0;
          return `<div style="margin-bottom:.75rem"><div class="d-flex align-center justify-between mb-1"><span class="text-sm">${lbl}</span><span class="text-sm" style="font-weight:700;color:${col}">${val}</span></div><div style="height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${col};border-radius:3px"></div></div></div>`;
        }).join('')}
      </div>
      <div class="card">
        <h3 style="margin-bottom:1rem">Score Distribution</h3>
        ${Object.entries(dist).map(([range,count])=>{
          const pct = placements.length>0 ? Math.round(count/placements.length*100):0;
          const col = range==='90-100'?'var(--green)':range==='70-89'?'var(--blue)':range==='50-69'?'var(--amber)':'var(--red)';
          return `<div style="margin-bottom:.75rem"><div class="d-flex align-center justify-between mb-1"><span class="text-sm">${range}%</span><span class="text-sm" style="font-weight:700;color:${col}">${count} (${pct}%)</span></div><div style="height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${col};border-radius:3px"></div></div></div>`;
        }).join('')}
      </div>
      <div class="card">
        <h3 style="margin-bottom:1rem">Top Industries</h3>
        ${topInds.length ? topInds.map(([ind,count])=>{
          const pct = orgs.length>0?Math.round(count/orgs.length*100):0;
          return `<div style="margin-bottom:.75rem"><div class="d-flex align-center justify-between mb-1"><span class="text-sm">${esc(ind)}</span><span class="text-sm" style="font-weight:700;color:var(--blue)">${count}</span></div><div style="height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--blue);border-radius:3px"></div></div></div>`;
        }).join('') : '<p class="text-sm text-muted">No data yet.</p>'}
      </div>
    </div>

    <!-- Supervisor reports + Activity log -->
    <div class="grid-two">
      <div class="card">
        <h3 style="margin-bottom:1rem">Supervisor Reports <span class="badge badge-blue ml-2">${supReports.length}</span></h3>
        ${supReports.length ? `<div class="table-wrap"><table>
          <thead><tr><th>Student</th><th>Period</th><th>Technical</th><th>Ethic</th><th>Recommendation</th></tr></thead>
          <tbody>${supReports.map(r=>{
            const s=students.find(x=>x.id===r.student_id);
            return`<tr><td><strong>${esc(s?.full_name||'—')}</strong></td><td class="text-sm text-muted">${esc(r.period||'—')}</td><td><span class="badge badge-blue">${r.technical_score||'—'}/10</span></td><td><span class="badge badge-green">${r.ethic_score||'—'}/10</span></td><td class="text-xs">${esc((r.recommendation||'—').slice(0,30))}</td></tr>`;
          }).join('')}</tbody>
        </table></div>` : '<p class="text-sm text-muted">No supervisor reports submitted yet.</p>'}
      </div>

      <div class="card">
        <h3 style="margin-bottom:1rem">Recent Activity</h3>
        ${actLog.length ? `<div style="max-height:320px;overflow-y:auto">
          ${actLog.map(entry=>`
            <div style="display:flex;align-items:flex-start;gap:.75rem;padding:.65rem 0;border-bottom:1px solid var(--border)">
              <span style="font-size:1.1rem;flex-shrink:0">${actIcons[entry.action]||'📝'}</span>
              <div style="flex:1;min-width:0">
                <p style="font-size:.83rem;font-weight:600;text-transform:capitalize">${esc(entry.action?.replace(/_/g,' '))}</p>
                ${entry.details?`<p class="text-xs text-muted">${esc(entry.details)}</p>`:''}
              </div>
              <span class="text-xs text-muted" style="flex-shrink:0">${relTime(entry.created_at)}</span>
            </div>`).join('')}
        </div>` : '<p class="text-sm text-muted">No activity recorded yet.</p>'}
      </div>
    </div>

    <!-- Department table -->
    <div class="card mt-3">
      <h3 style="margin-bottom:1rem">Students by Department</h3>
      ${topDepts.length ? `<div class="table-wrap"><table>
        <thead><tr><th>Department</th><th>Students</th><th>% of Total</th><th>Placed</th></tr></thead>
        <tbody>${topDepts.map(([dept,count])=>{
          const placed = placements.filter(p=>students.find(s=>s.id===p.student_id&&s.department===dept)).length;
          return`<tr><td><strong>${esc(dept)}</strong></td><td>${count}</td><td><span class="badge badge-blue">${Math.round(count/students.length*100)}%</span></td><td>${placed} / ${count}</td></tr>`;
        }).join('')}</tbody>
      </table></div>` : '<p class="text-sm text-muted">No department data yet.</p>'}
    </div>`;
}
</script>
</body>
</html>
