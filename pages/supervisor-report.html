<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Supervisor Report — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let currentUser, org, allocatedStudents=[], allStudents=[], allPlacements=[];

document.addEventListener('DOMContentLoaded', async () => {
  currentUser = initAppShell('Assessment Report');
  if (!currentUser) return;

  org = await getOrgByUserId(currentUser.id);
  [allStudents, allPlacements] = await Promise.all([getStudents(), getPlacements()]);

  if (!org) {
    document.getElementById('pageContent').innerHTML = `<div class="empty"><h3>Profile incomplete</h3><p><a href="profile.html" class="text-blue">Complete your profile first →</a></p></div>`;
    return;
  }

  allocatedStudents = allPlacements
    .filter(p => p.org_id === org.id && p.status === 'confirmed')
    .map(p => allStudents.find(s => s.id === p.student_id))
    .filter(Boolean);

  renderPage();
});

function renderPage() {
  const el = document.getElementById('pageContent');
  if (!allocatedStudents.length) {
    el.innerHTML = `
      <div class="page-header"><div><h1>Assessment Report</h1><p>Submit performance evaluations for allocated students</p></div></div>
      <div class="empty"><h3>No confirmed students yet</h3><p>You don't have any confirmed student placements to assess at this time.</p></div>`;
    return;
  }

  const options = allocatedStudents.map(s => `<option value="${s.id}">${esc(s.full_name)} (${esc(s.student_id)})</option>`).join('');

  el.innerHTML = `
    <div class="page-header"><div><h1>Assessment Report</h1><p>Submit performance evaluations for allocated students</p></div></div>
    <div id="alertBox"></div>
    <div class="grid-two">
      <div class="card">
        <h3 style="margin-bottom:1rem">Submit Evaluation</h3>
        <div class="form-group">
          <label class="form-label">Student</label>
          <select id="f_student" class="form-control"><option value="">Select student…</option>${options}</select>
        </div>
        <div class="form-group">
          <label class="form-label">Evaluation Period</label>
          <input id="f_period" class="form-control" placeholder="e.g. March – April 2026">
        </div>
        <div class="form-group">
          <label class="form-label">Technical Performance <span class="text-muted text-xs">(1–10)</span></label>
          <input type="number" id="f_technical" class="form-control" min="1" max="10" placeholder="8">
        </div>
        <div class="form-group">
          <label class="form-label">Work Ethic & Punctuality <span class="text-muted text-xs">(1–10)</span></label>
          <input type="number" id="f_ethic" class="form-control" min="1" max="10" placeholder="9">
        </div>
        <div class="form-group">
          <label class="form-label">Communication Skills <span class="text-muted text-xs">(1–10)</span></label>
          <input type="number" id="f_communication" class="form-control" min="1" max="10" placeholder="8">
        </div>
        <div class="form-group">
          <label class="form-label">Overall Comments</label>
          <textarea id="f_comments" class="form-control" rows="4" placeholder="Provide a brief overall assessment of the student's performance…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Recommendation</label>
          <select id="f_recommendation" class="form-control">
            <option value="">Select…</option>
            <option value="Excellent — highly recommended">Excellent — highly recommended</option>
            <option value="Good — recommended">Good — recommended</option>
            <option value="Satisfactory — meets expectations">Satisfactory — meets expectations</option>
            <option value="Needs improvement">Needs improvement</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="submitReport()">📋 Submit Report</button>
      </div>

      <div class="card">
        <h3 style="margin-bottom:1rem">Allocated Students</h3>
        ${allocatedStudents.map(s => {
          const p = allPlacements.find(x=>x.student_id===s.id);
          return `<div class="mini-card" style="margin-bottom:.75rem">
            <div class="d-flex align-center justify-between">
              <div><p class="text-strong">${esc(s.full_name)}</p><p class="text-xs text-muted">${esc(s.student_id)} · ${esc(s.department||'—')}</p></div>
              <span class="badge badge-green">Confirmed</span>
            </div>
            <div class="score-wrap mt-2"><div class="score-bar"><div class="score-fill" style="width:${p?.score||0}%"></div></div><span class="score-num">${p?.score||0}%</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

async function submitReport() {
  const student_id    = document.getElementById('f_student')?.value;
  const period        = document.getElementById('f_period')?.value.trim();
  const technical     = parseInt(document.getElementById('f_technical')?.value);
  const ethic         = parseInt(document.getElementById('f_ethic')?.value);
  const communication = parseInt(document.getElementById('f_communication')?.value);
  const comments      = document.getElementById('f_comments')?.value.trim();
  const recommendation= document.getElementById('f_recommendation')?.value;

  if (!student_id)   { showAlert('alertBox','Please select a student.','error'); return; }
  if (!period)       { showAlert('alertBox','Please enter the evaluation period.','error'); return; }
  if (!comments)     { showAlert('alertBox','Please enter overall comments.','error'); return; }
  if (!recommendation){ showAlert('alertBox','Please select a recommendation.','error'); return; }

  await submitSupervisorReport({ student_id, org_id: org.id, period, technical_score: technical, ethic_score: ethic, communication_score: communication, comments, recommendation });
  const student = allocatedStudents.find(s=>s.id===student_id);
  await createNotif(student?.user_id, '📋 Supervisor Report Submitted', `Your industrial supervisor at ${org.org_name} has submitted your performance report for ${period}.`, 'info');
  await logActivity('submit_supervisor_report', `Report submitted for student ${student?.student_id}`);
  showAlert('alertBox','✓ Report submitted successfully! Student has been notified.','success');
  document.getElementById('f_student').value = '';
  document.getElementById('f_period').value = '';
  document.getElementById('f_technical').value = '';
  document.getElementById('f_ethic').value = '';
  document.getElementById('f_communication').value = '';
  document.getElementById('f_comments').value = '';
  document.getElementById('f_recommendation').value = '';
}
</script>
</body>
</html>
