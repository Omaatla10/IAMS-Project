<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Organizations — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let allOrgs = [];

document.addEventListener('DOMContentLoaded', async () => {
  const u = initAppShell('Organizations');
  if (!u) return;

  // ── FIX: toolbar built ONCE, never re-rendered ──
  document.getElementById('pageContent').innerHTML = `
    <div class="page-header d-flex align-center justify-between flex-wrap gap-2">
      <div><h1>Registered Organizations</h1><p id="orgCount">Loading…</p></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem">
      <div class="table-search-wrap" style="flex:1;max-width:280px">
        <span class="table-search-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input id="srch" class="table-search" placeholder="Search name, industry, skills…" oninput="filterOrgs()">
      </div>
      <select id="fInd" class="form-control" style="max-width:200px" onchange="filterOrgs()">
        <option value="">All Industries</option>
      </select>
    </div>
    <div id="orgGrid"></div>`;

  allOrgs = await getOrganizations();

  // Populate industry filter
  const industries = [...new Set(allOrgs.map(o=>o.industry).filter(Boolean))].sort();
  const fInd = document.getElementById('fInd');
  industries.forEach(i => { const o = document.createElement('option'); o.value=i; o.textContent=i; fInd.appendChild(o); });

  renderOrgCards(allOrgs);
});

function filterOrgs() {
  const q   = document.getElementById('srch')?.value.toLowerCase() || '';
  const ind = document.getElementById('fInd')?.value || '';
  let res = allOrgs;
  if (q)   res = res.filter(o=>[o.org_name,o.industry,o.required_skills,o.description].join(' ').toLowerCase().includes(q));
  if (ind) res = res.filter(o=>(o.industry||'').toLowerCase()===ind.toLowerCase());
  renderOrgCards(res);
}

function renderOrgCards(orgs) {
  document.getElementById('orgCount').textContent = `${orgs.length} / ${allOrgs.length} organization(s)`;
  if (!orgs.length) {
    document.getElementById('orgGrid').innerHTML = `<div class="empty"><h3>No organizations found</h3><p>Try a different search or filter.</p></div>`;
    return;
  }
  const cards = orgs.map(o => {
    const skills = split(o.required_skills);
    const tags   = skills.slice(0,5).map(s=>`<span class="tag">${esc(s)}</span>`).join('');
    const extra  = skills.length>5 ? `<span class="tag">+${skills.length-5}</span>` : '';
    return `<div class="card hover">
      <div class="d-flex align-center justify-between mb-2">
        <div class="d-flex align-center gap-2">
          <div class="av av-green av-lg"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18V7H3z"/><path d="M7 21V11"/><path d="M12 21V11"/><path d="M17 21V11"/></svg></div>
          <div>
            <h3 class="mb-0 text-md">${esc(o.org_name||'Unnamed')}</h3>
            <p class="text-xs text-muted">${esc(o.industry||'Industry not set')}</p>
          </div>
        </div>
        <span class="badge badge-blue">${o.positions||1} pos.</span>
      </div>
      ${o.description?`<p class="text-sm text-ink2 leading-loose mb-2">${esc(o.description.slice(0,130))}${o.description.length>130?'…':''}</p>`:''}
      <p class="text-xs text-muted mb-2 text-uppercase">Required Skills</p>
      <div class="tags mb-2">${tags}${extra}${!o.required_skills?'<span class="text-xs text-muted">None</span>':''}</div>
      ${o.contact_person||o.phone?`<div class="divider"></div><p class="text-xs text-muted">📞 ${esc(o.contact_person||'')}${o.phone?' · '+esc(o.phone):''}</p>`:''}
    </div>`;
  }).join('');
  document.getElementById('orgGrid').innerHTML = `<div class="card-grid">${cards}</div>`;
}
</script>
</body>
</html>
