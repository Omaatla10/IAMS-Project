<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Students — IAMS</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
let allStudents=[], allPlacements=[], allOrgs=[];

document.addEventListener('DOMContentLoaded', async () => {
  const u = initAppShell('Students');
  if (!u) return;
  Auth.require('coordinator');

  // ── FIX: Build toolbar ONCE so the search input is never destroyed ──
  document.getElementById('pageContent').innerHTML = `
    <div class="page-header d-flex align-center justify-between flex-wrap gap-2">
      <div><h1>Registered Students</h1><p id="studentCount">Loading…</p></div>
      <button class="btn btn-outline btn-sm" onclick="exportStudentsCSV()">⬇ Export CSV</button>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-header-title">All Students</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <div class="table-search-wrap">
            <span class="table-search-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input id="srch" class="table-search" placeholder="Search name, ID, skills, dept…" oninput="filterStudents()">
          </div>
          <select id="fDept" class="form-control" style="max-width:160px;font-size:.83rem" onchange="filterStudents()">
            <option value="">All Departments</option>
          </select>
          <select id="fStatus" class="form-control" style="max-width:140px;font-size:.83rem" onchange="filterStudents()">
            <option value="">All Status</option>
            <option value="placed">Placed</option>
            <option value="unmatched">Unmatched</option>
            <option value="confirmed">Confirmed</option>
          </select>
        </div>
      </div>
      <div id="tableBody"></div>
    </div>`;

  [allStudents, allPlacements, allOrgs] = await Promise.all([getStudents(), getPlacements(), getOrganizations()]);

  // Populate department filter
  const depts = [...new Set(allStudents.map(s=>s.department).filter(Boolean))].sort();
  const fDept = document.getElementById('fDept');
  depts.forEach(d => { const o = document.createElement('option'); o.value=d; o.textContent=d; fDept.appendChild(o); });

  renderStudentRows(allStudents);
});

function filterStudents() {
  const q    = document.getElementById('srch')?.value.toLowerCase() || '';
  const dept = document.getElementById('fDept')?.value || '';
  const stat = document.getElementById('fStatus')?.value || '';
  let res = allStudents;
  if (q)    res = res.filter(s => [s.full_name,s.student_id,s.department,s.skills,s.email].join(' ').toLowerCase().includes(q));
  if (dept) res = res.filter(s => s.department === dept);
  if (stat === 'placed')     res = res.filter(s => allPlacements.find(p=>p.student_id===s.id));
  if (stat === 'unmatched')  res = res.filter(s => !allPlacements.find(p=>p.student_id===s.id));
  if (stat === 'confirmed')  res = res.filter(s => allPlacements.find(p=>p.student_id===s.id && p.status==='confirmed'));
  renderStudentRows(res);
}

function renderStudentRows(students) {
  document.getElementById('studentCount').textContent = `${students.length} / ${allStudents.length} student(s)`;
  const rows = students.map(s => {
    const p = allPlacements.find(x=>x.student_id===s.id);
    const o = p ? allOrgs.find(x=>x.id===p.org_id) : null;
    const tags = split(s.skills).slice(0,4).map(sk=>`<span class="tag">${esc(sk)}</span>`).join('');
    const extra = split(s.skills).length>4 ? `<span class="tag">+${split(s.skills).length-4}</span>` : '';
    return `<tr>
      <td><div class="d-flex align-center gap-2"><div class="av">${(s.full_name||'S')[0].toUpperCase()}</div><div><strong>${esc(s.full_name||'—')}</strong><br><span class="text-xs text-muted">${esc(s.email||'')}</span></div></div></td>
      <td><code class="code-badge">${esc(s.student_id||'—')}</code></td>
      <td>${esc(s.department||'—')}</td>
      <td><strong class="text-green">${esc(String(s.gpa||'—'))}</strong></td>
      <td><div class="tags">${tags}${extra}</div></td>
      <td>${p&&o ? `<span class="badge ${p.status==='confirmed'?'badge-green':'badge-amber'}">${esc(o.org_name)}</span>` : '<span class="badge badge-red" style="opacity:.6">Unmatched</span>'}</td>
    </tr>`;
  }).join('');
  document.getElementById('tableBody').innerHTML = students.length
    ? `<table><thead><tr><th>Student</th><th>ID</th><th>Department</th><th>GPA</th><th>Skills</th><th>Placement</th></tr></thead><tbody>${rows}</tbody></table>`
    : `<div class="empty"><h3>No students found</h3><p>Try a different search or filter.</p></div>`;
}
</script>
</body>
</html>
